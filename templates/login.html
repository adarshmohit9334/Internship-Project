<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BG Portal Login</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f4f7fb;
            margin: 0;
        }
        .login-container {
            max-width: 420px;
            margin: 80px auto;
            background: #fff;
            padding: 32px;
            border-radius: 12px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.08);
        }
        h2 { margin-top: 0; }
        form { display: flex; flex-direction: column; gap: 12px; }
        input {
            padding: 12px;
            border: 1px solid #d5dbe6;
            border-radius: 8px;
        }
        button {
            background: #001256;
            color: #fff;
            border: none;
            padding: 12px;
            border-radius: 8px;
            cursor: pointer;
        }
        .flash { margin-bottom: 12px; padding: 10px; border-radius: 8px; }
        .error { background: #ffe5e5; color: #a60000; }
        .success { background: #e7f9ee; color: #1f7a3d; }
    </style>
</head>
<body>
    <div class="login-container">
        {% with messages = get_flashed_messages(with_categories=true) %}
            {% if messages %}
                {% for category, message in messages %}
                    <div class="flash {{ category }}">{{ message }}</div>
                {% endfor %}
            {% endif %}
        {% endwith %}
        <h2>Welcome Back</h2>
        <form method="post">
            <input type="email" name="email" placeholder="Email address" required>
            <input type="password" name="password" placeholder="Password" required>
            <button type="submit">Login</button>
        </form>
        <p style="margin-top: 16px; text-align: center;">
            New user? <a href="{{ url_for('signup') }}">Create account</a>
        </p>
    </div>
</body>
</html>
