{% extends 'base.html' %}
{% block title %}New Application Form{% endblock %}
{% block content %}
<div>
    <div class="bg-[#2541B2] text-white p-4 rounded-t-lg shadow-sm flex items-center justify-between">
        <div>
            <h2 class="font-headline-sm text-headline-sm uppercase tracking-wide">New Application</h2>
        </div>
        <span class="bg-white/20 px-3 py-1 rounded text-label-sm">Step 1 of 3</span>
    </div>

    <form method="post" class="bg-white border border-outline-variant rounded-b-lg p-6">
        <div class="grid grid-cols-1 md:grid-cols-2 gap-5">
            <div>
                <label class="block text-sm text-on-surface-variant mb-1">Applicant Name</label>
                <input name="applicant_name" class="w-full border border-outline-variant rounded px-3 py-2" placeholder="Enter applicant name">
            </div>
            <div>
                <label class="block text-sm text-on-surface-variant mb-1">Customer ID</label>
                <input name="customer_id" class="w-full border border-outline-variant rounded px-3 py-2" placeholder="Enter customer ID">
            </div>
            <div>
                <label class="block text-sm text-on-surface-variant mb-1">Product Category</label>
                <select name="product_category" class="w-full border border-outline-variant rounded px-3 py-2">
                    <option>Performance Bond</option>
                    <option>Advance Payment</option>
                    <option>Bid Bond</option>
                </select>
            </div>
            <div>
                <label class="block text-sm text-on-surface-variant mb-1">Requested Amount</label>
                <input name="requested_amount" class="w-full border border-outline-variant rounded px-3 py-2" placeholder="$0.00">
            </div>
            <div class="md:col-span-2">
                <label class="block text-sm text-on-surface-variant mb-1">Description</label>
                <textarea name="description" class="w-full border border-outline-variant rounded px-3 py-2" rows="5" placeholder="Describe the purpose of the application"></textarea>
            </div>
        </div>

        <div class="mt-6 flex justify-end gap-3">
            <button type="submit" class="bg-primary text-white px-4 py-2 rounded">Submit Application</button>
        </div>
    </form>
</div>
{% endblock %}
