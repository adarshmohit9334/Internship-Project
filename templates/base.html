<!DOCTYPE html>
<html class="light" lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}BGP Portal{% endblock %}</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Arimo:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <script>
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "on-error": "#ffffff",
                        "inverse-on-surface": "#eff1f3",
                        "on-primary-fixed": "#001257",
                        error: "#ba1a1a",
                        "on-tertiary-container": "#779f9d",
                        "on-background": "#191c1e",
                        "on-error-container": "#93000a",
                        "outline-variant": "#c6c5d2",
                        outline: "#767681",
                        "tertiary-container": "#093635",
                        "on-tertiary-fixed-variant": "#254d4c",
                        "inverse-surface": "#2d3133",
                        "secondary-container": "#738bfe",
                        "surface-container": "#eceef0",
                        "tertiary-fixed-dim": "#a4cecc",
                        secondary: "#3a54c4",
                        "on-tertiary-fixed": "#00201f",
                        "surface-bright": "#f8f9fb",
                        "surface-container-lowest": "#ffffff",
                        "on-secondary-fixed": "#001257",
                        "secondary-fixed": "#dde1ff",
                        "on-secondary-fixed-variant": "#1c3aac",
                        "secondary-fixed-dim": "#b9c3ff",
                        "on-secondary-container": "#001f7f",
                        "surface-container-high": "#e6e8ea",
                        "on-tertiary": "#ffffff",
                        "surface-container-highest": "#e0e3e5",
                        tertiary: "#00201f",
                        "surface-dim": "#d8dadc",
                        "tertiary-fixed": "#c0ebe8",
                        "inverse-primary": "#b9c3ff",
                        primary: "#001256",
                        "surface-variant": "#e0e3e5",
                        "error-container": "#ffdad6",
                        "surface-container-low": "#f2f4f6",
                        "primary-fixed": "#dde1ff",
                        "surface-tint": "#4c5a9d",
                        "primary-container": "#1b2a6b",
                        "on-primary-fixed-variant": "#344283",
                        surface: "#f8f9fb",
                        "on-surface-variant": "#454650",
                        "on-secondary": "#ffffff",
                        "primary-fixed-dim": "#b9c3ff",
                        "on-primary": "#ffffff",
                        "on-surface": "#191c1e",
                        background: "#f8f9fb",
                        "on-primary-container": "#8694db"
                    },
                    borderRadius: {
                        DEFAULT: "0.125rem",
                        lg: "0.25rem",
                        xl: "0.5rem",
                        full: "0.75rem"
                    },
                    spacing: {
                        "stack-compact": "8px",
                        "section-margin": "32px",
                        "stack-base": "16px",
                        "container-padding": "24px",
                        "sidebar-width": "220px",
                        gutter: "16px"
                    },
                    fontFamily: {
                        "body-lg": ["Arimo"],
                        "body-md": ["Arimo"],
                        "headline-lg": ["Arimo"],
                        "headline-md": ["Arimo"],
                        "label-sm": ["Arimo"],
                        "label-md": ["Arimo"],
                        "headline-sm": ["Arimo"],
                        "body-sm": ["Arimo"]
                    },
                    fontSize: {
                        "body-lg": ["16px", { lineHeight: "24px", fontWeight: "400" }],
                        "body-md": ["14px", { lineHeight: "20px", fontWeight: "400" }],
                        "headline-lg": ["24px", { lineHeight: "32px", fontWeight: "700" }],
                        "headline-md": ["20px", { lineHeight: "28px", fontWeight: "700" }],
                        "label-sm": ["11px", { lineHeight: "16px", fontWeight: "700" }],
                        "label-md": ["13px", { lineHeight: "18px", fontWeight: "700" }],
                        "headline-sm": ["16px", { lineHeight: "24px", fontWeight: "700" }],
                        "body-sm": ["12px", { lineHeight: "16px", fontWeight: "400" }]
                    }
                }
            }
        };
    </script>
    <style>
        body { font-family: 'Arimo', sans-serif; background-color: #F5F7F9; }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
            vertical-align: middle;
            font-size: 18px;
        }
        .custom-scrollbar::-webkit-scrollbar { width: 4px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #c6c5d2; border-radius: 10px; }
    </style>
</head>
<body class="flex min-h-screen overflow-hidden">
    <aside class="fixed left-0 top-0 h-full w-[220px] bg-primary-container text-white border-r border-outline-variant z-50 flex flex-col overflow-y-auto custom-scrollbar">
        <div class="px-6 py-8 flex flex-col">
            <h1 class="font-headline-md text-headline-md font-bold text-surface-bright leading-tight">BGP Portal</h1>
            <p class="font-body-sm text-body-sm opacity-70">Enterprise Guarantee Mgmt</p>
        </div>
        <nav class="flex-1">
            <div class="flex flex-col">
                <a href="{{ url_for('new_application') }}" class="flex items-center h-[40px] px-4 text-white opacity-80 hover:bg-primary hover:opacity-100 transition-colors cursor-pointer active:scale-95 group {% if request.endpoint == 'new_application' %}bg-primary border-l-4 border-on-tertiary-container opacity-100{% endif %}">
                    <span class="material-symbols-outlined mr-3">add_box</span>
                    <span class="font-body-md text-body-md">New Application</span>
                </a>
                <a href="{{ url_for('pending_approvals') }}" class="flex items-center h-[40px] px-4 text-white opacity-80 hover:bg-primary hover:opacity-100 transition-colors cursor-pointer active:scale-95 group {% if request.endpoint == 'pending_approvals' %}bg-primary border-l-4 border-on-tertiary-container opacity-100{% endif %}">
                    <span class="material-symbols-outlined mr-3">pending_actions</span>
                    <span class="font-body-md text-body-md">Pending Approvals</span>
                </a>
                <a href="{{ url_for('new_bg_request') }}" class="flex items-center h-[40px] px-4 text-white opacity-80 hover:bg-primary hover:opacity-100 transition-colors cursor-pointer active:scale-95 group {% if request.endpoint == 'new_bg_request' %}bg-primary border-l-4 border-on-tertiary-container opacity-100{% endif %}">
                    <span class="material-symbols-outlined mr-3">archive</span>
                    <span class="font-body-md text-body-md">New BG Request</span>
                </a>
                <a href="{{ url_for('signup') }}" class="flex items-center h-[40px] px-4 text-white opacity-80 hover:bg-primary hover:opacity-100 transition-colors cursor-pointer active:scale-95 group {% if request.endpoint == 'signup' %}bg-primary border-l-4 border-on-tertiary-container opacity-100{% endif %}">
                    <span class="material-symbols-outlined mr-3">assessment</span>
                    <span class="font-body-md text-body-md">Sign Up</span>
                </a>
            </div>
        </nav>
        <div class="p-4 border-t border-white/10 text-center">
            <img class="h-8 mx-auto opacity-50 grayscale hover:grayscale-0 transition-all" src="https://lh3.googleusercontent.com/aida-public/AB6AXuDHKXQK2oVOjApn5dkcnOC9rztAFNqeHx8XrzzdwS7c7GSr77pJucTanZhGSluxd3-6-WubcV06TqDvHpea0ArOdEmm68KDYbNT2YMIRBFPkrVKR1-_Sn5schdUQ2QW7t63F_VQVd-OtPKSCNHpZ3tc9S7ojuxl6MZwwGeB7XBsLLMwYMz5YNWHLhERdut2VpOZ8zlsD4q--KaS-u2xD1K7a50kbJ2YwiCYHvcmjYRqatlVtlQhj-IIxbjok_YbiybF2x5cR8dCvCo" alt="Logo">
        </div>
    </aside>

    <div class="flex-1 flex flex-col ml-[220px]">
        <header class="flex justify-between items-center h-16 w-full px-8 bg-surface-container-lowest border-b border-outline-variant sticky top-0 z-40">
            <div class="flex items-center gap-4 flex-1">
                <div class="relative w-full max-w-md">
                    <span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-outline">search</span>
                    <input class="w-full pl-10 pr-4 py-2 bg-surface-container border border-outline-variant rounded focus:outline-none focus:ring-1 focus:ring-secondary text-body-md font-body-md" placeholder="Search Application No. / Customer ID" type="text">
                </div>
            </div>
            <div class="flex items-center gap-6">
                <button class="font-label-md text-label-md text-on-surface-variant hover:text-primary transition-colors cursor-pointer">Change Password</button>
                <div class="h-6 w-[1px] bg-outline-variant"></div>
                <div class="flex items-center gap-3">
                    <div class="text-right">
                        <p class="font-label-md text-label-md font-bold text-primary">John Mehta (151514)</p>
                        <p class="text-[10px] uppercase tracking-wider text-outline">Approver Level II</p>
                    </div>
                    <img class="w-8 h-8 rounded-full border border-outline-variant object-cover" src="https://lh3.googleusercontent.com/aida-public/AB6AXuD-DNqyn8Ne_qUUDMuaWv3hDfMN_AOBB1Ot1_xGchyxIJGrJZnQ67RZijNf5Ietc1MRvuVjZcxz4ILjQsDI0k4tiMPq4lLmf3s2wRidpB_eyx8i4Fs7gKMmGkSq0y5-U8Lt1zMpGMruirqHxcdfOid5zbCHTWse7FxHMrvPdIdYIJzT0SxrDC6dhaMuYHQsXvq9VeMzAmpptNtg879uUUe0hC4Ec-E8FXg_ujnomRgZhrYdyi_4b7ATtfwQMK2gStkRvLqrgicZ1IE" alt="Profile">
                </div>
                <button class="font-label-md text-label-md bg-primary text-white px-4 py-1.5 rounded hover:bg-opacity-90 transition-all active:scale-95">Log Out</button>
            </div>
        </header>

        <main class="flex-1 p-8 overflow-y-auto bg-[#F5F7F9]">
            {% block content %}{% endblock %}
        </main>
    </div>
</body>
</html>
