{% extends 'base.html' %}
{% block title %}Sign Up{% endblock %}
{% block content %}
<div class="flex items-center justify-center min-h-[70vh]">
    <div class="w-full max-w-2xl bg-white border border-outline-variant rounded-xl shadow-sm p-8">
        <div class="text-center mb-6">
            <h2 class="text-2xl font-bold">Create Account</h2>
            <p class="text-sm text-on-surface-variant">Register to access the BGP Portal</p>
        </div>
        <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
            <div>
                <label class="block text-sm text-on-surface-variant mb-1">Full Name</label>
                <input class="w-full border border-outline-variant rounded px-3 py-2" placeholder="Enter full name">
            </div>
            <div>
                <label class="block text-sm text-on-surface-variant mb-1">Email</label>
                <input class="w-full border border-outline-variant rounded px-3 py-2" placeholder="name@example.com">
            </div>
            <div>
                <label class="block text-sm text-on-surface-variant mb-1">Employee ID</label>
                <input class="w-full border border-outline-variant rounded px-3 py-2" placeholder="EMP-0001">
            </div>
            <div>
                <label class="block text-sm text-on-surface-variant mb-1">Role</label>
                <select class="w-full border border-outline-variant rounded px-3 py-2">
                    <option>Approver</option>
                    <option>Admin</option>
                    <option>Reviewer</option>
                </select>
            </div>
            <div>
                <label class="block text-sm text-on-surface-variant mb-1">Password</label>
                <input class="w-full border border-outline-variant rounded px-3 py-2" type="password" placeholder="********">
            </div>
            <div>
                <label class="block text-sm text-on-surface-variant mb-1">Confirm Password</label>
                <input class="w-full border border-outline-variant rounded px-3 py-2" type="password" placeholder="********">
            </div>
        </div>
        <div class="mt-6 flex justify-end gap-3">
            <button class="bg-surface-container text-on-surface px-4 py-2 rounded">Cancel</button>
            <button class="bg-primary text-white px-4 py-2 rounded">Register</button>
        </div>
    </div>
</div>
{% endblock %}
