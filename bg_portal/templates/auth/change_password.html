{% extends 'base.html' %}
{% block title %}Change Password | BankPort Terminal{% endblock %}
{% block page_title %}Change Password{% endblock %}
{% block content %}

<!-- Page Header -->
<div class="mb-6">
    <h2 class="font-h1 text-2xl text-on-surface font-bold tracking-tight">Security Credentials</h2>
    <p class="text-on-surface-variant text-sm">Modify your sign-in credentials below.</p>
</div>

<div class="max-w-[600px] bg-white border border-outline-variant p-4 sm:p-6 space-y-6">
    <div class="border-b border-outline-variant pb-2">
        <h3 class="text-primary font-bold text-sm uppercase tracking-wider">Update Password</h3>
    </div>

    <form method="POST" action="{{ url_for('auth.change_password') }}" class="space-y-6">
        <!-- Current Password -->
        <div class="flex flex-col space-y-1">
            <label class="font-label-bold text-xs font-bold text-on-surface" for="old_password">Current Password</label>
            <input class="signup-input h-10 px-3 text-sm bg-white border border-outline-variant rounded-sm" id="old_password" name="old_password" required type="password" placeholder="Enter current password"/>
        </div>

        <!-- New Password -->
        <div class="flex flex-col space-y-1">
            <label class="font-label-bold text-xs font-bold text-on-surface" for="new_password">New Password</label>
            <input class="signup-input h-10 px-3 text-sm bg-white border border-outline-variant rounded-sm" id="new_password" name="new_password" required type="password" placeholder="Enter new password"/>
        </div>

        <!-- Confirm New Password -->
        <div class="flex flex-col space-y-1">
            <label class="font-label-bold text-xs font-bold text-on-surface" for="confirm_password">Confirm New Password</label>
            <input class="signup-input h-10 px-3 text-sm bg-white border border-outline-variant rounded-sm" id="confirm_password" name="confirm_password" required type="password" placeholder="Re-type new password"/>
        </div>

        <!-- Actions -->
        <div class="flex justify-between items-center pt-4 border-t border-outline-variant">
            <a href="{{ url_for('auth.profile') }}" class="text-xs font-bold text-outline hover:text-on-surface uppercase tracking-wider">Back to Profile</a>
            <button type="submit" class="px-6 py-2.5 bg-primary text-white text-xs font-bold uppercase tracking-wider rounded hover:bg-opacity-95 transition-all text-center">
                Change Password
            </button>
        </div>
    </form>
</div>
{% endblock %}
