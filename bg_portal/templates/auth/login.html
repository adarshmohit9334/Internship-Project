{% extends 'base.html' %}
{% block title %}Login{% endblock %}
{% block page_title %}Login{% endblock %}
{% block content %}
<div class="auth-card">
    <h2>Welcome back</h2>
    <form method="post">
        <div class="form-group"><label for="personnel_no">Personnel No.</label><input type="text" id="personnel_no" name="personnel_no" required></div>
        <div class="form-group"><label for="password">Password</label><input type="password" id="password" name="password" required></div>
        <button type="submit" class="btn-primary">Login</button>
        <p class="auth-link"><a href="{{ url_for('auth.signup_step1') }}">Create account</a></p>
    </form>
</div>
{% endblock %}
