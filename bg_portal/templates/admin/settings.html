{% extends 'base.html' %}
{% block title %}Settings{% endblock %}
{% block page_title %}Settings{% endblock %}
{% block content %}
<div class="card-panel"><div class="section-header-bar">Portal Settings</div><form method="post" action="{{ url_for('settings.save_settings') }}"><div class="form-group"><label>MD Approval Threshold</label><input name="md_threshold" value="{{ settings.md_threshold }}"></div><div class="form-group"><label><input type="checkbox" name="notify_email" {% if settings.notify_email %}checked{% endif %}> Email notifications</label></div><div class="form-group"><label><input type="checkbox" name="notify_dashboard" {% if settings.notify_dashboard %}checked{% endif %}> Dashboard notifications</label></div><button class="btn-primary">Save Settings</button></form></div>
{% endblock %}
