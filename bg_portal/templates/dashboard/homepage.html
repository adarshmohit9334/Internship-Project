{% extends 'base.html' %}
{% block title %}Homepage | BankPort Terminal{% endblock %}
{% block page_title %}Homepage{% endblock %}
{% block content %}
<div class="flex flex-col items-center justify-center min-h-[70vh] px-4 text-center select-none bg-white rounded border border-outline-variant p-10 md:p-16 shadow-sm">
    
    <!-- Header Logo Section -->
    <div class="flex flex-col items-center mb-10">
        <div class="flex items-center justify-center gap-3.5 mb-3">
            <!-- Shield checkmark in black circle -->
            <svg viewBox="0 0 100 100" class="w-12 h-12">
                <circle cx="50" cy="50" r="48" fill="#000000"/>
                <path d="M50,28 C57,28 67,25 72,32 C72,50 65,68 50,75 C35,68 28,50 28,32 C33,25 43,28 50,28 Z" fill="none" stroke="#ffffff" stroke-width="6" stroke-linejoin="round"/>
                <path d="M42,50 L48,56 L58,44" fill="none" stroke="#ffffff" stroke-width="6" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
            <span class="text-black font-black text-3xl md:text-4xl tracking-tight font-sans">BANKPORT</span>
        </div>
        <p class="text-slate-500 font-extrabold text-xs md:text-sm tracking-[0.2em] uppercase">
            Guarantee Operations Terminal
        </p>
    </div>

    <!-- Central Illustration -->
    <div class="w-32 h-44 my-4 flex items-center justify-center">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 130" class="w-full h-full">
            <!-- Circular Lens Frame (Green Outline) -->
            <circle cx="50" cy="45" r="34" fill="#f0fdfa" stroke="#0f766e" stroke-width="5"/>
            
            <!-- Three Inner Circles -->
            <!-- Circle 1: Yellow/Orange (Top-Left) -->
            <circle cx="36" cy="36" r="9" fill="#fef3c7" stroke="#b45309" stroke-width="1.5"/>
            <!-- Circle 2: Red/Orange (Top-Right) -->
            <circle cx="62" cy="32" r="8" fill="#fee2e2" stroke="#b91c1c" stroke-width="1.5"/>
            <!-- Circle 3: Lavender/Purple (Bottom-Right) -->
            <circle cx="54" cy="56" r="10" fill="#f3e8ff" stroke="#6b21a8" stroke-width="1.5"/>
            
            <!-- Magnifying Glass / Indicator Handle (Gray) -->
            <rect x="45" y="79" width="10" height="26" rx="2" fill="#d1d5db"/>
            <rect x="42" y="105" width="16" height="12" rx="2" fill="#d1d5db"/>
            <line x1="50" y1="79" x2="50" y2="105" stroke="#9ca3af" stroke-width="2"/>
        </svg>
    </div>

    <!-- Slogan Section -->
    <div class="mt-6 max-w-xl">
        <h2 class="text-black font-extrabold text-2xl md:text-3xl tracking-tight leading-snug">
            Your guarantee, approved faster.
        </h2>
        <p class="text-gray-500 font-medium text-sm md:text-base mt-2">
            From request to MD or Board sign-off, in one terminal.
        </p>
    </div>

</div>
{% endblock %}
